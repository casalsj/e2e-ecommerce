name: E2E Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 min (mínimo realista en Actions)
  workflow_dispatch: {}        # ejecución manual desde la UI

# Evita ejecuciones solapadas si una tarda más de 15 min
concurrency:
  group: e2e-monitor
  cancel-in-progress: false

defaults:
  run:
    working-directory: mop-e2e

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mop-e2e/package-lock.json

      - run: npm ci

      - name: Instalar navegador
        run: npx playwright install --with-deps chromium

      - name: Ejecutar tests E2E (3 tiendas)
        run: npm test

      - name: Subir reporte si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: mop-e2e/playwright-report/
          retention-days: 7

      - name: Avisar a Google Chat si falla
        if: failure()
        run: |
          curl -sf -X POST \
            -H 'Content-Type: application/json; charset=UTF-8' \
            --data "{\"text\":\"🚨 *E2E FALLÓ* en monitor multi-tienda (themopbookstore / thecampamento / emestudios)\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
