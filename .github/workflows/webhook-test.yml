name: Webhook Test

# Prueba manual del webhook de Google Chat por tienda (OK / KO).
on:
  workflow_dispatch:
    inputs:
      store:
        description: Tienda a probar
        required: true
        type: choice
        options:
          - themopbookstore
          - thecampamento
          - emestudios
      outcome:
        description: Resultado a simular
        required: true
        type: choice
        options:
          - ok
          - ko

concurrency:
  group: webhook-test-${{ github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: mop-e2e

jobs:
  webhook-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mop-e2e/package-lock.json

      - run: npm ci

      - name: Instalar navegador
        if: inputs.outcome == 'ok'
        run: npx playwright install --with-deps chromium

      - name: Ejecutar tests E2E (OK)
        if: inputs.outcome == 'ok'
        run: npm test -- --project=${{ inputs.store }}

      - name: Avisar OK a Google Chat
        if: inputs.outcome == 'ok' && success()
        run: |
          curl -sf -X POST \
            -H 'Content-Type: application/json; charset=UTF-8' \
            --data "{\"text\":\"✅ *E2E OK* — prueba webhook\nTienda: *${{ inputs.store }}*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"

      - name: Simular fallo y avisar KO a Google Chat
        if: inputs.outcome == 'ko'
        run: |
          curl -sf -X POST \
            -H 'Content-Type: application/json; charset=UTF-8' \
            --data "{\"text\":\"🚨 *E2E FALLÓ* — prueba webhook\nTienda: *${{ inputs.store }}*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
          exit 1
